<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, user-scalable=no">
  <title>Tales Of The Brave</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #171411; }
    body { display: flex; align-items: center; justify-content: center; }
    #unity-container { position: relative; }
    #unity-canvas { display: block; background: #171411; }
    #unity-loading { position: absolute; left: 20%; right: 20%; top: 50%; height: 18px; border: 1px solid #c89b62; }
    #unity-progress { width: 0; height: 100%; background: #c89b62; }
    #unity-warning { position: absolute; left: 10%; right: 10%; top: 10px; text-align: center; z-index: 2; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>
    <div id="unity-loading"><div id="unity-progress"></div></div>
    <div id="unity-warning"></div>
  </div>
  <script>
    const baseWidth = 1280;
    const baseHeight = 720;
    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");

    function resizeUnityCanvas() {
      const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);
      const cssWidth = Math.max(1, Math.floor(baseWidth * scale));
      const cssHeight = Math.max(1, Math.floor(baseHeight * scale));
      container.style.width = cssWidth + "px";
      container.style.height = cssHeight + "px";
      canvas.style.width = cssWidth + "px";
      canvas.style.height = cssHeight + "px";

      const pixelRatio = window.devicePixelRatio || 1;
      const renderWidth = Math.max(baseWidth, Math.floor(cssWidth * pixelRatio));
      canvas.width = renderWidth;
      canvas.height = Math.floor(renderWidth * baseHeight / baseWidth);
    }

    resizeUnityCanvas();
    window.addEventListener("resize", resizeUnityCanvas);

    function unityShowBanner(message, type) {
      const warning = document.querySelector("#unity-warning");
      const item = document.createElement("div");
      item.textContent = message;
      item.style.padding = "10px";
      item.style.background = type === "error" ? "#c33" : "#dbb84d";
      warning.appendChild(item);
      if (type !== "error") setTimeout(() => item.remove(), 5000);
    }

    const buildUrl = "Build";
    const config = {
      arguments: [],
      dataUrl: buildUrl + "/tales-of-the-brave.data.unityweb",
      frameworkUrl: buildUrl + "/tales-of-the-brave.framework.js.unityweb",
      codeUrl: buildUrl + "/tales-of-the-brave.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "The Gaming Dark Studio",
      productName: "Tales Of The Brave",
      productVersion: "0.1",
      showBanner: unityShowBanner,
      matchWebGLToCanvasSize: false
    };

    const loader = document.createElement("script");
    loader.src = buildUrl + "/tales-of-the-brave.loader.js";
    loader.onload = () => createUnityInstance(canvas, config, progress => {
      document.querySelector("#unity-progress").style.width = (progress * 100) + "%";
    }).then(() => {
      document.querySelector("#unity-loading").style.display = "none";
      resizeUnityCanvas();
    }).catch(message => alert(message));
    document.body.appendChild(loader);
  </script>
</body>
</html>
